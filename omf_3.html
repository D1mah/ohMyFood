<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles/css/omf.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>ohmyfood</title>
    
</head>

<header class="header">
    <div class="header__arrow"><i class="fa-sharp fa-solid fa-arrow-left"></i></div>
    <div class="header__title"><p>ohmyfood</p></div>
    <div class="header__third-col"></div>
</header>

<body>
    
    <div class="img"><img class="img--size" src="./images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg" alt="A la française"></div>
    
    <section class="menu">
        <div class="menu__name">
            <h1>A la française</h1>
            <i class="fa-regular fa-heart"></i>
        </div>
        
        <div class="menu__categorie">
            <h2><span class="underline">ENTR</span>EES</h2>
            
            <button class="menu__categorie-btn">
                <h3>Tartare de poulpe acidulé</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Aux zestes d'orangee</p>
                    <div class="price">25€</div>
                </div>
            </button>
            <button class="menu__categorie-btn">
                <h3>Velouté de légumes d'antan</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Carotte, panais, topinambour</p>
                    <div class="price">35€</div>
                </div>
            </button>
            
            <button class="menu__categorie-btn">
                <h3>Soupe à l'oignon</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Revisitée </p>
                    <div class="price">20€</div>
                </div>
            </button>
        </div>
        
        <div class="menu__categorie">
            <h2><span class="underline">PLAT</span>S</h2>
            <button class="menu__categorie-btn">
                <h3>Coquilles Saint-Jacques</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Accompagnées d'une purée de panais</p>
                    <div class="price">40€</div>
                </div>
            </button>
            <button class="menu__categorie-btn">
                <h3>Magret de canard</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Et parmentier de pommes de terre</p>
                    <div class="price">35€</div>
                </div>
            </button>
            <button class="menu__categorie-btn">
                <h3>Pigeonneau d’Ille-et-Vilaine</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Sur son lit de gnocchis aux légumes</p>
                    <div class="price">44€</div>
                </div>
            </button>
        </div>
        
        <div class="menu__categorie">
            <h2><span class="underline">DESS</span>ERTS</h2>
            
            <button class="menu__categorie-btn">
                <h3>Pétales de violettes glacés</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Et purée de noisettest</p>
                    <div class="price">18€</div>
                </div>
            </button>
            <button class="menu__categorie-btn">
                <h3>Fondant au chocolat</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Revisité</p>
                    <div class="price">22€</div>
                </div>
            </button>
            <button class="menu__categorie-btn">
                <h3>Millefeuille croustillant</h3>
                <div class="menu__categorie-btn__txt">
                    <p class="ingredients">Myrtilles et pâte d’amande</p>
                    <div class="price">23€</div>
                </div>
            </button>
        </div>
        
        <div class="menu__command"><button class="pink_btn ">Commander</button></div>
        
    </section>
    
</body>


<footer class="footer">
    <h2>ohmyfood</h2>
    
    <a href="#"><div class="footer__icon"><i class="fa-solid fa-utensils"></i></div><p>Proposer un restaurant</p></a> 
    
    
    <a href="#"><div class="footer__icon"><i class="fa-solid fa-handshake-angle"></i></div><p>Devenir partenaire</p></a>
    
    <a href="#">Mentions légales</a>
    
    <a href="#">Contact</a>
</footer>
