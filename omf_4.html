<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/omf.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>ohmyfood</title>
    
</head>

<header><div class="menu_header">
    <div class="arrow_header"><i class="fa-sharp fa-solid fa-arrow-left"></i></div>
    <div class="brand_menu"><p>ohmyfood</p></div>
    <div class="third_col"></div>
</div></header>

<body>
    
    <div class="img"><img class="img_size" src="./images/restaurants/louis-hansel-shotsoflouis-qNBGVyOCY8Q-unsplash.jpg" alt="Le délice des sens"></div>
    
    <section class="menu">
        <div class="restaurant_name">
            <h1>Le délice des sens</h1>
            <i class="fa-regular fa-heart"></i>
        </div>
        
        <div class="categorie">
            <h2><span class="underline">ENTR</span>EES</h2>
            
            <button class="menu_btn">
                <h3>Tartare de thon</h3>
                <div class="sub_txt">
                    <p class="ingredients">Assaisonné au yuzu</p>
                    <div class="price">25€</div>
                </div>
            </button>
            <button class="menu_btn">
                <h3>Bouchée de homard croustillant</h3>
                <div class="sub_txt">
                    <p class="ingredients">Et sa farandole de petits légumes</p>
                    <div class="price">35€</div>
                </div>
            </button>
            
            <button class="menu_btn">
                <h3>Velouté de cèpes</h3>
                <div class="sub_txt">
                    <p class="ingredients">Aux truffes</p>
                    <div class="price">20€</div>
                </div>
            </button>
        </div>
        
        <div class="categorie">
            <h2><span class="underline">PLAT</span>S</h2>
            <button class="menu_btn">
                <h3>Poulet rôti aux herbes de Provence</h3>
                <div class="sub_txt">
                    <p class="ingredients">Et sa crème de truffe</p>
                    <div class="price">40€</div>
                </div>
            </button>
            <button class="menu_btn">
                <h3>Langouste rôtie</h3>
                <div class="sub_txt">
                    <p class="ingredients">Et ses légumes de saison</p>
                    <div class="price">35€</div>
                </div>
            </button>
            <button class="menu_btn">
                <h3>Côte de boeuf Angust</h3>
                <div class="sub_txt">
                    <p class="ingredients">Aux agrumes </p>
                    <div class="price">44€</div>
                </div>
            </button>
        </div>
        
        <div class="categorie">
            <h2><span class="underline">DESS</span>ERTS</h2>
            
            <button class="menu_btn">
                <h3>Farandole de desserts</h3>
                <div class="sub_txt">
                    <p class="ingredients">Du chef</p>
                    <div class="price">18€</div>
                </div>
            </button>
            <button class="menu_btn">
                <h3>Crème brulée</h3>
                <div class="sub_txt">
                    <p class="ingredients">Revisitée</p>
                    <div class="price">22€</div>
                </div>
            </button>
            <button class="menu_btn">
                <h3>Tiramisu</h3>
                <div class="sub_txt">
                    <p class="ingredients">À la noisette</p>
                    <div class="price">23€</div>
                </div>
            </button>
        </div>
        
        <div class="command"><button class="pink_btn ">Commander</button></div>
        
    </section>
    
</body>


<footer>
    <div><h2>ohmyfood</h2></div>
    
    <a href="#"><div class="footer_icon"><i class="fa-solid fa-utensils"></i></div><p>Proposer un restaurant</p></a> 
    
    
    <a href="#"><div class="footer_icon"><i class="fa-solid fa-handshake-angle"></i></div><p>Devenir partenaire</p></a>
    
    <a href="#">Mentions légales</a>
    
    <a href="#">Contact</a>
</footer>
